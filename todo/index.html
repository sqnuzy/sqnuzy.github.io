<body>
  <div class="container">
    <h1>待办清单</h1>

    <div class="add-form">
      <input type="text" id="titleInput" placeholder="添加新任务..." />
      <select id="priorityInput">
        <option value="0">P0</option>
        <option value="1">P1</option>
        <option value="2" selected>P2</option>
        <option value="3">P3</option>
        <option value="4">P4</option>
      </select>
      <input type="date" id="dateInput" />
      <input type="time" id="timeInput" />
      <button onclick="addTask()">添加</button>
    </div>

    <div class="options-row">
      <select id="taskTypeInput" onchange="toggleTaskType()">
        <option value="normal">普通任务</option>
        <option value="longterm">长期任务</option>
        <option value="recurring">周期任务</option>
      </select>

      <span id="recurrenceOptions" style="display:none; gap:6px; align-items:center;">
        <select id="recurrenceType" onchange="toggleRecurrenceType()">
          <option value="daily">每天</option>
          <option value="weekly" selected>每周</option>
          <option value="monthly">每月</option>
        </select>
        <select id="recurrenceDay">
          <option value="1">周一</option>
          <option value="2">周二</option>
          <option value="3">周三</option>
          <option value="4">周四</option>
          <option value="5" selected>周五</option>
          <option value="6">周六</option>
          <option value="0">周日</option>
        </select>
      </span>
    </div>

    <div class="sort-bar">
      <button id="sortPriority" class="active" onclick="setSortMode('priority')">按优先级</button>
      <button id="sortTime" onclick="setSortMode('time')">按时间</button>
    </div>

    <ul class="task-list" id="taskList"></ul>
  </div>

  <script>
    let tasks = [];
    let sortMode = 'priority';
    const STORAGE_KEY = 'sqnuzy_blog_todo_tasks';

    function loadTasks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        tasks = raw ? JSON.parse(raw) : [];
      } catch (e) {
        tasks = [];
      }
      render();
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function toggleTaskType() {
      const type = document.getElementById('taskTypeInput').value;
      const showDate = type === 'normal';
      const showRecurrence = type === 'recurring';
      document.getElementById('dateInput').style.display = showDate ? '' : 'none';
      document.getElementById('timeInput').style.display = showDate ? '' : 'none';
      document.getElementById('recurrenceOptions').style.display = showRecurrence ? 'flex' : 'none';
      if (showRecurrence) toggleRecurrenceType();
    }

    function toggleRecurrenceType() {
      const rType = document.getElementById('recurrenceType').value;
      const daySelect = document.getElementById('recurrenceDay');
      if (rType === 'daily') {
        daySelect.style.display = 'none';
      } else {
        daySelect.style.display = '';
        daySelect.innerHTML = rType === 'weekly'
          ? '<option value="1">周一</option><option value="2">周二</option><option value="3">周三</option><option value="4">周四</option><option value="5" selected>周五</option><option value="6">周六</option><option value="0">周日</option>'
          : Array.from({length:31}, (_,i) => `<option value="${i+1}">${i+1}号</option>`).join('');
      }
    }

    function formatDate(d) {
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function getNextRecurrenceDate(recurrence, recurrenceDay) {
      const today = new Date();
      today.setHours(0,0,0,0);

      if (recurrence === 'daily') {
        return formatDate(today);
      } else if (recurrence === 'weekly') {
        const day = parseInt(recurrenceDay);
        const curr = today.getDay();
        let diff = day - curr;
        if (diff <= 0) diff += 7;
        const next = new Date(today);
        next.setDate(next.getDate() + diff);
        return formatDate(next);
      } else if (recurrence === 'monthly') {
        const d = parseInt(recurrenceDay);
        let next = new Date(today.getFullYear(), today.getMonth(), d);
        if (next <= today) next = new Date(today.getFullYear(), today.getMonth() + 1, d);
        return formatDate(next);
      }
      return null;
    }

    function advanceRecurrenceDate(t) {
      const base = t.date ? new Date(t.date + 'T00:00:00') : new Date();
      base.setHours(0,0,0,0);
      if (t.recurrence === 'daily') {
        base.setDate(base.getDate() + 1);
      } else if (t.recurrence === 'weekly') {
        base.setDate(base.getDate() + 7);
      } else if (t.recurrence === 'monthly') {
        base.setMonth(base.getMonth() + 1);
      }
      t.date = formatDate(base);
    }

    function addTask() {
      const title = document.getElementById('titleInput').value.trim();
      if (!title) return;

      const taskType = document.getElementById('taskTypeInput').value;
      const isLongTerm = taskType === 'longterm';
      const isRecurring = taskType === 'recurring';
      const recurrence = isRecurring ? document.getElementById('recurrenceType').value : 'none';
      const recurrenceDay = isRecurring ? document.getElementById('recurrenceDay').value : null;

      let date = null, time = null;
      if (isRecurring) {
        date = getNextRecurrenceDate(recurrence, recurrenceDay);
      } else if (!isLongTerm) {
        date = document.getElementById('dateInput').value || null;
        time = document.getElementById('timeInput').value || null;
      }

      const task = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2),
        title,
        priority: parseInt(document.getElementById('priorityInput').value),
        date,
        time,
        is_long_term: isLongTerm,
        recurrence,
        recurrence_day: recurrenceDay,
        status: 'todo',
        progress: '',
        created_at: new Date().toISOString()
      };

      tasks.push(task);
      document.getElementById('titleInput').value = '';
      saveTasks();
      render();
    }

    function cycleStatus(id) {
      const t = tasks.find(x => x.id === id);
      if (!t) return;
      const order = ['todo', 'doing', 'done'];
      t.status = order[(order.indexOf(t.status) + 1) % 3];

      if (t.status === 'doing' && !t.progress) {
        const note = prompt('进度备注（可留空）：');
        if (note !== null) t.progress = note.trim();
      }

      if (t.status === 'todo') t.progress = '';

      if (t.status === 'done' && t.recurrence && t.recurrence !== 'none') {
        setTimeout(() => {
          t.status = 'todo';
          t.progress = '';
          advanceRecurrenceDate(t);
          saveTasks();
          render();
        }, 800);
      }

      saveTasks();
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      render();
    }

    function startEdit(id) {
      const span = document.getElementById('title-' + id);
      const task = tasks.find(t => t.id === id);
      if (!task || task.status === 'done') return;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'task-title-input';
      input.value = task.title;

      const finish = () => {
        const val = input.value.trim();
        if (val) task.title = val;
        saveTasks();
        render();
      };

      input.onblur = finish;
      input.onkeydown = (e) => {
        if (e.key === 'Enter') input.blur();
        if (e.key === 'Escape') {
          input.value = task.title;
          input.blur();
        }
      };

      span.replaceWith(input);
      input.focus();
    }

    function editProgress(id) {
      const t = tasks.find(x => x.id === id);
      if (!t || t.status !== 'doing') return;
      const el = document.getElementById('prog-' + id);
      if (!el) return;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'progress-input';
      input.value = t.progress;

      const finish = () => {
        t.progress = input.value.trim();
        saveTasks();
        render();
      };

      input.onblur = finish;
      input.onkeydown = (e) => {
        if (e.key === 'Enter') input.blur();
        if (e.key === 'Escape') {
          input.value = t.progress;
          input.blur();
        }
      };

      el.replaceWith(input);
      input.focus();
    }

    function editMeta(id) {
      const t = tasks.find(x => x.id === id);
      if (!t) return;
      const el = document.getElementById('meta-' + id);
      if (!el) return;

      const container = document.createElement('span');
      container.className = 'meta-edit';

      const typeSelect = document.createElement('select');
      typeSelect.innerHTML = '<option value="normal">普通</option><option value="longterm">长期</option><option value="recurring">周期</option>';
      typeSelect.value = (t.recurrence && t.recurrence !== 'none') ? 'recurring' : (t.is_long_term ? 'longterm' : 'normal');

      const dateIn = document.createElement('input');
      dateIn.type = 'date';
      dateIn.value = t.date || '';

      const timeIn = document.createElement('input');
      timeIn.type = 'time';
      timeIn.value = t.time || '';

      const recTypeSelect = document.createElement('select');
      recTypeSelect.innerHTML = '<option value="daily">每天</option><option value="weekly">每周</option><option value="monthly">每月</option>';
      recTypeSelect.value = t.recurrence && t.recurrence !== 'none' ? t.recurrence : 'weekly';

      const recDaySelect = document.createElement('select');

      function fillRecDayOptions() {
        if (recTypeSelect.value === 'weekly') {
          recDaySelect.innerHTML = '<option value="1">周一</option><option value="2">周二</option><option value="3">周三</option><option value="4">周四</option><option value="5">周五</option><option value="6">周六</option><option value="0">周日</option>';
          recDaySelect.value = t.recurrence_day || '5';
          recDaySelect.style.display = '';
        } else if (recTypeSelect.value === 'monthly') {
          recDaySelect.innerHTML = Array.from({length:31}, (_,i) => `<option value="${i+1}">${i+1}号</option>`).join('');
          recDaySelect.value = t.recurrence_day || '1';
          recDaySelect.style.display = '';
        } else {
          recDaySelect.style.display = 'none';
        }
      }

      recTypeSelect.onchange = fillRecDayOptions;
      fillRecDayOptions();

      function updateVisibility() {
        const v = typeSelect.value;
        dateIn.style.display = v === 'normal' ? '' : 'none';
        timeIn.style.display = v === 'normal' ? '' : 'none';
        recTypeSelect.style.display = v === 'recurring' ? '' : 'none';
        recDaySelect.style.display = v === 'recurring' && recTypeSelect.value !== 'daily' ? '' : 'none';
      }

      typeSelect.onchange = updateVisibility;
      updateVisibility();

      const okBtn = document.createElement('button');
      okBtn.textContent = '确定';
      okBtn.onclick = () => {
        const v = typeSelect.value;
        t.is_long_term = v === 'longterm';

        if (v === 'longterm') {
          t.date = null;
          t.time = null;
          t.recurrence = 'none';
          t.recurrence_day = null;
        } else if (v === 'recurring') {
          t.recurrence = recTypeSelect.value;
          t.recurrence_day = recTypeSelect.value !== 'daily' ? recDaySelect.value : null;
          t.date = getNextRecurrenceDate(t.recurrence, t.recurrence_day);
          t.time = null;
        } else {
          t.date = dateIn.value || null;
          t.time = timeIn.value || null;
          t.recurrence = 'none';
          t.recurrence_day = null;
        }

        saveTasks();
        render();
      };

      container.appendChild(typeSelect);
      container.appendChild(dateIn);
      container.appendChild(timeIn);
      container.appendChild(recTypeSelect);
      container.appendChild(recDaySelect);
      container.appendChild(okBtn);

      el.replaceWith(container);
    }

    function setSortMode(mode) {
      sortMode = mode;
      document.getElementById('sortPriority').className = mode === 'priority' ? 'active' : '';
      document.getElementById('sortTime').className = mode === 'time' ? 'active' : '';
      render();
    }

    function sortedTasks() {
      const undone = tasks.filter(t => t.status !== 'done');
      const done = tasks.filter(t => t.status === 'done');

      const dateVal = (t) => {
        if (t.is_long_term) return 1;
        if (!t.date) return 2;
        return 0;
      };

      if (sortMode === 'priority') {
        undone.sort((a, b) => {
          if (a.priority !== b.priority) return a.priority - b.priority;
          const da = dateVal(a), db = dateVal(b);
          if (da !== db) return da - db;
          if (a.date && b.date) return a.date.localeCompare(b.date);
          return 0;
        });
      } else {
        undone.sort((a, b) => {
          const da = dateVal(a), db = dateVal(b);
          if (da !== db) return da - db;
          if (a.date && b.date) {
            const cmp = a.date.localeCompare(b.date);
            if (cmp !== 0) return cmp;
          }
          return a.priority - b.priority;
        });
      }

      return [...undone, ...done];
    }

    function formatRecurrence(t) {
      if (!t.recurrence || t.recurrence === 'none') return '';
      if (t.recurrence === 'daily') return '每天';
      if (t.recurrence === 'weekly') {
        const names = ['周日','周一','周二','周三','周四','周五','周六'];
        return '每' + names[parseInt(t.recurrence_day)];
      }
      if (t.recurrence === 'monthly') return '每月' + t.recurrence_day + '号';
      return '';
    }

    function formatMeta(t) {
      if (t.is_long_term) return '长期';
      if (!t.date) return '';
      let s = t.date;
      if (t.time) s += ' ' + t.time;
      return s;
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function render() {
      const list = document.getElementById('taskList');
      const sorted = sortedTasks();

      if (sorted.length === 0) {
        list.innerHTML = '<li class="empty-msg">暂无任务</li>';
        return;
      }

      list.innerHTML = sorted.map(t => {
        const statusClass = t.status === 'done' ? ' done' : (t.status === 'doing' ? ' doing' : '');
        const meta = formatMeta(t);
        const statusIcon = t.status === 'done' ? '&#10003;' : (t.status === 'doing' ? '&#9654;' : '');
        const progressHtml = t.status === 'doing' && t.progress
          ? `<span class="progress-note" id="prog-${t.id}" onclick="editProgress('${t.id}')" title="${escapeHtml(t.progress)}">${escapeHtml(t.progress)}</span>`
          : (t.status === 'doing' ? `<span class="progress-note" id="prog-${t.id}" onclick="editProgress('${t.id}')" style="color:#ccc">+备注</span>` : '');
        const recLabel = formatRecurrence(t);
        const recHtml = recLabel ? `<span class="recurrence-tag">${recLabel}</span>` : '';

        return `<li class="task-item${statusClass}">
          <button class="status-btn ${t.status}" onclick="cycleStatus('${t.id}')">${statusIcon}</button>
          <span class="priority-tag p${t.priority}">P${t.priority}</span>
          <span class="task-title" id="title-${t.id}" onclick="startEdit('${t.id}')">${escapeHtml(t.title)}</span>
          ${progressHtml}
          ${recHtml}
          <span class="task-meta" id="meta-${t.id}" onclick="editMeta('${t.id}')" ${!meta ? 'style="color:#ccc"' : ''}>${meta || '+时间'}</span>
          <button class="delete-btn" onclick="deleteTask('${t.id}')">&times;</button>
        </li>`;
      }).join('');
    }

    document.getElementById('titleInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });

    toggleTaskType();
    loadTasks();
  </script>
